name: sharktype
services:
  staircase:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "127.0.0.1:10001:10001"
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
